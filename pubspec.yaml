name: lvtfield
description: "LVTField - Mobile GIS for Forest Survey"
publish_to: 'none'
version: 2.0.0+7

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # GPS
  geolocator: ^13.0.2
  
  # Camera & Media
  image_picker: ^1.1.2
  
  # File handling
  file_picker: ^8.1.7
  archive: ^3.6.1
  xml: ^6.5.0
  
  # Navigation
  go_router: ^14.8.1
  
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  
  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  collection: ^1.19.1
  package_info_plus: ^8.3.0
  image: ^4.3.0
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
